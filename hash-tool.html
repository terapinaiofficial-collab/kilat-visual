<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generator Password — Kilat Visual</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#060910;color:#f1f5f9;font-family:Inter,system-ui,-apple-system,sans-serif;padding:24px}
  .card{width:100%;max-width:520px;background:#111726;border:1px solid rgba(59,130,246,.3);
    border-radius:16px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  h1{font-size:20px;margin:0 0 6px}
  p{font-size:13px;color:rgba(241,245,249,.6);line-height:1.6;margin:0 0 18px}
  label{font-size:12px;font-weight:600;display:block;margin-bottom:6px}
  input{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:10px;
    background:#060910;border:1px solid rgba(148,163,184,.25);color:#fff;font-size:15px}
  .out{margin-top:18px;background:#060910;border:1px solid rgba(148,163,184,.2);border-radius:10px;padding:14px}
  .out .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(241,245,249,.4);margin-bottom:6px}
  .hash{font-family:ui-monospace,Menlo,monospace;font-size:13px;word-break:break-all;color:#93c5fd}
  button{margin-top:12px;width:100%;padding:12px;border:0;border-radius:10px;cursor:pointer;
    background:linear-gradient(135deg,#3b82f6,#1e3a8a);color:#fff;font-size:14px;font-weight:700}
  .ok{color:#4ade80;font-size:12px;text-align:center;margin-top:10px;height:14px}
  code{background:rgba(148,163,184,.15);padding:1px 5px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
  <div class="card">
    <h1>⚡ Generator Password Login</h1>
    <p>Ketik password yang kamu mau, lalu salin hasil hash-nya ke <code>config.js</code> pada
      bagian <code>loginPasswordHash</code>. Password aslinya TIDAK pernah tersimpan di website.</p>
    <label for="pwd">Password yang diinginkan</label>
    <input id="pwd" type="text" placeholder="mis. KilatVisualku2026" autocomplete="off" />
    <div class="out">
      <div class="lbl">loginPasswordHash (salin ini)</div>
      <div class="hash" id="hash">—</div>
    </div>
    <button id="copy">Salin Hash</button>
    <div class="ok" id="ok"></div>
  </div>
<script>
  var SALT='kilatvisual-2026::'; // HARUS sama dengan salt di index.html
  var pwdEl=document.getElementById('pwd'),hashEl=document.getElementById('hash'),okEl=document.getElementById('ok');
  function toHex(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
  async function update(){var p=pwdEl.value;if(!p){hashEl.textContent='—';return;}
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(SALT+p));hashEl.textContent=toHex(buf);}
  pwdEl.addEventListener('input',update);
  document.getElementById('copy').addEventListener('click',function(){
    var t=hashEl.textContent;if(!t||t==='—')return;
    navigator.clipboard.writeText(t).then(function(){okEl.textContent='✓ Hash disalin — tempel ke config.js';
      setTimeout(function(){okEl.textContent='';},2500);});});
</script>
</body>
</html>
